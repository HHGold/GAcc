name: Android Release Build

on:
  push:
    tags:
      - 'v*' # 意思是當您上傳像 v1.0.0 這樣的標籤時，就會觸發自動打包

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 編譯正式版 APK (Release Build)
      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/GAcc.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          # 會將打好的 APK 檔上傳到 Github Releases
          files: app/build/outputs/apk/release/GAcc.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
