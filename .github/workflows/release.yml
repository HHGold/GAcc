name: Android Release Build

on:
  push:
    tags:
      - 'v*' # 意思是當您上傳像 v1.0.0 這樣的標籤時，就會觸發自動打包

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" > keystore.base64
          base64 --decode keystore.base64 > app/release.p12

      # 編譯正式版 APK (Release Build)
      - name: Build APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk GAcc.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          # 會將打好的 APK 檔上傳到 Github Releases
          files: GAcc.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
